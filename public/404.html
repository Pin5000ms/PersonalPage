<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting</title>
    <script>
      (function () {
        var pathname = window.location.pathname
        var search = window.location.search || ''
        var hash = window.location.hash || ''
        var redirect = pathname + search
        var nextUrl = '/?redirect=' + encodeURIComponent(redirect) + hash

        window.location.replace(nextUrl)
      })()
    </script>
  </head>
  <body></body>
</html>
