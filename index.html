<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Tom Chang 的個人網站，展示技能、專案與技術文章。"
    />
    <title>Tom Chang | Skills and Tech Notes</title>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search)
        const redirectPath = params.get('redirect')

        if (!redirectPath) {
          return
        }

        const nextUrl = `${redirectPath}${window.location.hash}`
        window.history.replaceState(null, '', nextUrl)
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
